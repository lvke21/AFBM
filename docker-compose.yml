services:
  postgres:
    image: postgres:16
    container_name: afbm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: afbm_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - afbm-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d afbm_manager"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  afbm-postgres-data:
